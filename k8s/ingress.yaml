apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: call-ai-ingress
  namespace: call-ai
  labels:
    app.kubernetes.io/name: call-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: call-ai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: call-ai-app
                port:
                  number: 80
